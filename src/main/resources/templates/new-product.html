<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout1 :: layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>New Product</title>
</head>
<body>
<section class="p-3">
    <form method="post" th:action="@{/admin/saveProduct}">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input class="form-control" type="text" name="name" th:value="${product.name}">
        </div>
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input class="form-control" type="number" name="price" th:value="${product.price}">
        </div>
        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input class="form-control" type="number" name="quantity" th:value="${product.quantity}">
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</section>
</body>
</html>
